<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportHub Arena - Reservasi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body class="home-page">

    <!-- TOGGLE -->
    <input type="checkbox" id="menu-toggle" hidden>
    <input type="checkbox" id="user-toggle" hidden>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-brand">
            <a href="welcome.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;">
                <img src="logo.png" alt="SportHub Logo">
            </a>
        </div>

        <!-- NAV LINKS -->
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="fields.html">Lapangan</a>
            <a href="reservasi.html" class="active">Reservasi</a>
            <a href="home.html#jadwal">Lokasi</a>
            <a href="home.html#promo">Promo</a>
        </div>

        <!-- ACTIONS -->
        <div class="nav-actions">

            <!-- USER -->
            <label class="user-menu" for="user-toggle">
                <div class="user-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <span class="user-name">
                    Guest
                </span>
                <i class="fas fa-chevron-down"></i>

                <!-- DROPDOWN -->
                <div class="dropdown-menu">
                    <a href="#">
                        <i class="fas fa-user-circle"></i>
                        Profil Saya
                    </a>
                    <a href="reservasi.html">
                        <i class="fas fa-calendar-check"></i>
                        Reservasi Saya
                    </a>
                    <a href="welcome.html">
                        <i class="fas fa-sign-out-alt"></i>
                        Logout
                    </a>
                </div>
            </label>

            <!-- HAMBURGER -->
            <label class="hamburger" for="menu-toggle">
                <i class="fas fa-bars"></i>
            </label>
        </div>
    </nav>

    <!-- MOBILE MENU -->
    <div class="mobile-menu">
        <a href="home.html">Home</a>
        <a href="fields.html">Lapangan</a>
        <a href="reservasi.html">Reservasi</a>
        <a href="home.html#jadwal">Lokasi</a>
        <a href="home.html#promo">Promo</a>
        <a href="welcome.html">Logout</a>
    </div>

    <!-- MAIN -->
    <main class="home-main">

        <!-- HEADER -->
        <div class="page-header">
            <h1>Reservasi Lapangan</h1>
            <p>
                Isi formulir berikut untuk melakukan booking lapangan
            </p>
        </div>

        <!-- FORM -->
        <section class="section">
            <div class="step-card">
                <form class="reservation-form" action="success.html">

                    <!-- NAMA -->
                    <div class="form-group">
                        <label>Nama Lengkap</label>
                        <div class="input-icon">
                            <i class="fas fa-user"></i>
                            <input type="text" placeholder="Masukkan nama lengkap" required>
                        </div>
                    </div>

                    <!-- LAPANGAN -->
                    <div class="form-group">
                        <label>Pilih Lapangan</label>
                        <div class="input-icon">
                            <i class="fas fa-map-marker-alt"></i>
                            <select required>
                                <option>
                                    Glow Arena Medan — Rp 120.000/jam
                                </option>
                                <option>
                                    Hoops Central Pro — Rp 85.000/jam
                                </option>
                                <option>
                                    Smash Arena Elite — Rp 50.000/jam
                                </option>
                                <option>
                                    Spike Arena Medan — Rp 60.000/jam
                                </option>
                            </select>
                        </div>
                    </div>

                    <!-- TANGGAL -->
                    <div class="form-group">
                        <label>Tanggal Reservasi</label>
                        <div class="input-icon">
                            <i class="fas fa-calendar"></i>
                            <input type="date" required>
                        </div>
                    </div>

                    <!-- JAM -->
                    <div class="form-group">
                        <label>Jam Booking</label>
                        <div class="input-icon">
                            <i class="fas fa-clock"></i>
                            <select required>
                                <option>08:00 - 09:00</option>
                                <option>10:00 - 11:00</option>
                                <option>13:00 - 14:00</option>
                                <option>15:00 - 16:00</option>
                                <option>19:00 - 20:00</option>
                            </select>
                        </div>
                    </div>

                    <!-- PEMBAYARAN -->
                    <div class="form-group">
                        <label>Metode Pembayaran</label>
                        <div class="input-icon">
                            <i class="fas fa-credit-card"></i>
                            <select required>
                                <option>Transfer Bank</option>
                                <option>QRIS</option>
                                <option>E-Wallet</option>
                                <option>Bayar di Tempat</option>
                            </select>
                        </div>
                    </div>

                    <!-- CATATAN -->
                    <div class="form-group">
                        <label>Catatan Tambahan</label>
                        <div class="input-icon textarea-icon">
                            <i class="fas fa-pencil-alt"></i>
                            <textarea rows="5" placeholder="Masukkan catatan tambahan..."></textarea>
                        </div>
                    </div>
            </div>

            <!-- BUTTON -->
            <div class="step-actions">
                <button type="submit" class="btn-primary">
                    <i class="fas fa-check-circle"></i>
                    Konfirmasi Booking
                </button>
            </div>
            </form>
            </div>
        </section>
    </main>
